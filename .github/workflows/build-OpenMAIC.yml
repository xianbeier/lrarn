name: Build OpenMAIC and Download Dist
 
on:
  workflow_dispatch: # 允许手动运行构建任务
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
 
      - name: Clone OpenMAIC repository
        run: |
          git clone https://github.com/THU-MAIC/OpenMAIC.git 
          cd OpenMAIC
 
      - name: Setup pnpm  # 新增：设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
 
      - name: Install dependencies
        working-directory: OpenMAIC
        run: pnpm install  # 改用 pnpm
 
      - name: Build project
        working-directory: OpenMAIC
        run: pnpm build  # 改用 pnpm
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMAIC-dist
          path: OpenMAIC
