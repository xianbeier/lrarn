name: Auto Build OpenCV 5 MinGW Release

on:
  # schedule:
  #   - cron: "0 20 * * *"   # 每天 4:00 (北京时间) 检查更新
  workflow_dispatch:
    inputs:
      opencv_tag:
        description: 'OpenCV tag to build (e.g. 5.0.0). Leave empty for latest 5.x'
        required: false
        default: ''
      build_contrib:
        description: 'Include opencv_contrib modules'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      build_world:
        description: 'Build as opencv_world (single combined library)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      build_shared:
        description: 'Build shared libs (DLL) or static libs'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      # ==========================================================
      # 1. Checkout
      # ==========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================================
      # 2. 获取 OpenCV 5.x 版本 tag
      # ==========================================================
      - name: Get latest OpenCV 5.x tag
        id: get_tag
        shell: pwsh
        run: |
          if ("${{ inputs.opencv_tag }}" -ne "") {
            $tag = "${{ inputs.opencv_tag }}"
            Write-Host "Using manually specified tag: $tag"
          } else {
            $releases = Invoke-RestMethod "https://api.github.com/repos/opencv/opencv/releases?per_page=50"
            $v5 = $releases | Where-Object { $_.tag_name -match '^5\.' } | Select-Object -First 1 -ExpandProperty tag_name
            if (-not $v5) {
              $tags = Invoke-RestMethod "https://api.github.com/repos/opencv/opencv/tags?per_page=100"
              $v5 = $tags | Where-Object { $_.name -match '^5\.' } | Select-Object -First 1 -ExpandProperty name
            }
            if (-not $v5) { $v5 = "5.x" }
            $tag = $v5
            Write-Host "Auto-detected tag: $tag"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          $display = $tag -replace '^5\.x$', '5.x-latest'
          echo "display=$display" >> $env:GITHUB_OUTPUT

      # ==========================================================
      # 3. 检查 Release 是否已存在
      # ==========================================================
      - name: Check if release already exists
        id: check
        shell: pwsh
        run: |
          $tag = "opencv-mingw-${{ steps.get_tag.outputs.tag }}"
          try {
            $r = Invoke-RestMethod "https://api.github.com/repos/${{ github.repository }}/releases"
            if ($r | Where-Object { $_.tag_name -eq $tag }) {
              Write-Host "Release $tag already exists."
              echo "skip=true" >> $env:GITHUB_OUTPUT
              return
            }
          } catch {}
          echo "skip=false" >> $env:GITHUB_OUTPUT

      # ==========================================================
      # 4. 安装 MinGW + CMake
      # ==========================================================
      - name: Install MinGW and CMake
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          choco install mingw -y --no-progress
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=1' -y --no-progress
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          g++ --version
          cmake --version

      # ==========================================================
      # 5. 下载 OpenCV 5 源码
      # ==========================================================
      - name: Download OpenCV 5 source
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $tag = "${{ steps.get_tag.outputs.tag }}"
          $branch = if ($tag -eq "5.x") { "5.x" } else { $tag }
          git clone --depth=1 --branch $branch https://github.com/opencv/opencv.git
          if ("${{ inputs.build_contrib }}" -eq "true") {
            git clone --depth=1 --branch $branch https://github.com/opencv/opencv_contrib.git
          }

      # ==========================================================
      # 6. 补丁: 修复 MinGW 兼容性
      # ==========================================================
      - name: Patch MinGW compatibility
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $nl = [Environment]::NewLine
          $patched = @()

          # ----------------------------------------------------------
          # 补丁 A: MLAS mlasi.h — posix_memalign 不存在
          # OpenCV 5 DNN 依赖 MLAS, 其 platform.cpp 包含 mlasi.h
          # mlasi.h 直接调用 posix_memalign, MinGW 无此函数
          # 修复: 用 _aligned_malloc 替代, 保留 int err 声明避免后续编译错误
          # ----------------------------------------------------------
          $f = "opencv/3rdparty/mlas/lib/mlasi.h"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw -Encoding UTF8
            if ($c.Contains('posix_memalign') -and -not $c.Contains('__MINGW32__')) {
              # 精确匹配: int err = posix_memalign(&ptr, ThreadedBufAlignment, size);
              $mingw = "#if defined(__MINGW32__) || defined(__MINGW64__)" + $nl
              $mingw += "    ptr = _aligned_malloc(size, ThreadedBufAlignment);" + $nl
              $mingw += "    int err = (ptr == nullptr) ? 12 : 0;  // 12 = ENOMEM" + $nl
              $mingw += "#else" + $nl
              $mingw += "    int err = posix_memalign(&ptr, ThreadedBufAlignment, size);" + $nl
              $mingw += "#endif"
              $n = $c -replace 'int\s+err\s*=\s*posix_memalign\s*\(\s*&ptr\s*,\s*ThreadedBufAlignment\s*,\s*size\s*\)\s*;', $mingw
              if ($n -eq $c) {
                # 宽松匹配
                $n = $c -replace '(\s+)(int\s+err\s*=\s*posix_memalign\s*\([^;]+\);)', ('$1#if defined(__MINGW32__) || defined(__MINGW64__)' + $nl + '$1    ptr = _aligned_malloc(size, ThreadedBufAlignment);' + $nl + '$1    int err = (ptr == nullptr) ? 12 : 0;' + $nl + '$1#else' + $nl + '$1$2' + $nl + '$1#endif')
              }
              if (-not $n.Contains('<malloc.h>')) {
                $n = "#include <malloc.h>" + $nl + $n
              }
              Set-Content $f $n -NoNewline -Encoding UTF8
              $patched += "A: mlasi.h posix_memalign -> _aligned_malloc"
            }
          }

          # ----------------------------------------------------------
          # 补丁 B: zlib-ng zbuild.h — _POSIX_C_SOURCE 导致误检测
          # zbuild.h 无条件定义 _POSIX_C_SOURCE 200809L
          # 这使得 stdlib.h 声明 posix_memalign, 但 MinGW MSVCRT 不提供实现
          # CMake check_symbol_exists 会误判为存在 → 链接失败
          # 修复: MinGW 下跳过 _POSIX_C_SOURCE 定义
          # ----------------------------------------------------------
          $f = "opencv/3rdparty/zlib-ng/zbuild.h"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw -Encoding UTF8
            if ($c.Contains('_POSIX_C_SOURCE') -and -not $c.Contains('__MINGW32__')) {
              $n = $c -replace '#ifndef _POSIX_C_SOURCE', '#if !defined(_POSIX_C_SOURCE) && !defined(__MINGW32__) && !defined(__MINGW64__)'
              $n = $n -replace '#  define _POSIX_C_SOURCE 200809L', '#  define _POSIX_C_SOURCE 200809L  // skipped on MinGW'
              Set-Content $f $n -NoNewline -Encoding UTF8
              $patched += "B: zbuild.h _POSIX_C_SOURCE MinGW guard"
            }
          }

          # ----------------------------------------------------------
          # 补丁 C: zlib-ng CMakeLists.txt — 强制关闭 posix_memalign 检测
          # check_symbol_exists(posix_memalign stdlib.h HAVE_POSIX_MEMALIGN)
          # 在 MinGW 下因 _POSIX_C_SOURCE 会误判, 必须跳过
          # 修复: 在 check 前插入 if(NOT MINGW) 守卫
          # ----------------------------------------------------------
          $f = "opencv/3rdparty/zlib-ng/CMakeLists.txt"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw -Encoding UTF8
            if ($c.Contains('check_symbol_exists(posix_memalign') -and -not $c.Contains('NOT MINGW')) {
              $n = $c -replace 'check_symbol_exists\(posix_memalign\s+stdlib\.h\s+HAVE_POSIX_MEMALIGN\)', 'if(NOT MINGW)' + $nl + '  check_symbol_exists(posix_memalign stdlib.h HAVE_POSIX_MEMALIGN)' + $nl + 'endif()'
              # 同样处理 aligned_alloc (MinGW 可能也有问题)
              $n = $n -replace 'check_symbol_exists\(aligned_alloc\s+stdlib\.h\s+HAVE_ALIGNED_ALLOC\)', 'if(NOT MINGW)' + $nl + '  check_symbol_exists(aligned_alloc stdlib.h HAVE_ALIGNED_ALLOC)' + $nl + 'endif()'
              Set-Content $f $n -NoNewline -Encoding UTF8
              $patched += "C: zlib-ng CMakeLists.txt posix_memalign/aligned_alloc MINGW guard"
            }
          }

          # ----------------------------------------------------------
          # 补丁 D: openjpeg CMakeLists.txt — 同理
          # check_symbol_exists(posix_memalign ...) 在 _POSIX_C_SOURCE 下误判
          # 修复: 同上
          # ----------------------------------------------------------
          $f = "opencv/3rdparty/openjpeg/CMakeLists.txt"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw -Encoding UTF8
            if ($c.Contains('check_symbol_exists(posix_memalign') -and -not $c.Contains('NOT MINGW')) {
              $n = $c -replace '(set\(CMAKE_REQUIRED_DEFINITIONS -D_POSIX_C_SOURCE=200112L\)\r?\n\s*check_symbol_exists\(posix_memalign\s+stdlib\.h\s+OPJ_HAVE_POSIX_MEMALIGN\))', 'if(NOT MINGW)' + $nl + '$1' + $nl + 'endif()'
              if ($n -eq $c) {
                # 备用: 简单替换
                $n = $c -replace 'check_symbol_exists\(posix_memalign\s+stdlib\.h\s+OPJ_HAVE_POSIX_MEMALIGN\)', 'if(NOT MINGW)' + $nl + '  check_symbol_exists(posix_memalign stdlib.h OPJ_HAVE_POSIX_MEMALIGN)' + $nl + 'endif()'
              }
              Set-Content $f $n -NoNewline -Encoding UTF8
              $patched += "D: openjpeg CMakeLists.txt posix_memalign MINGW guard"
            }
          }

          # ----------------------------------------------------------
          # 补丁 E: OpenCV root CMakeLists.txt — 确保 MinGW 下关闭 MEMALIGN
          # OPENCV_ENABLE_MEMALIGN 在 MinGW 下应该 OFF
          # (此选项通过 CMake 参数 -DOPENCV_ENABLE_MEMALIGN=OFF 已处理,
          #  这里只做记录, 无需文件补丁)
          # ----------------------------------------------------------
          $patched += "E: OPENCV_ENABLE_MEMALIGN=OFF via CMake flag (no file patch needed)"

          # ----------------------------------------------------------
          # 补丁总结
          # ----------------------------------------------------------
          Write-Host ""
          Write-Host "===== Patch Summary ====="
          $patched | ForEach-Object { Write-Host "  [PATCH] $_" }
          Write-Host "========================="

      # ==========================================================
      # 7. CMake 配置
      # ==========================================================
      - name: CMake Configure
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          mkdir build_opencv
          cd build_opencv

          $contribFlag = ""
          if ("${{ inputs.build_contrib }}" -eq "true" -and (Test-Path "../opencv_contrib/modules")) {
            $contribFlag = "-DOPENCV_EXTRA_MODULES_PATH=../opencv_contrib/modules"
          }

          $worldFlag = ""
          if ("${{ inputs.build_world }}" -eq "true") {
            $worldFlag = "-DBUILD_opencv_world=ON"
          }

          $sharedFlag = if ("${{ inputs.build_shared }}" -eq "true") { "ON" } else { "OFF" }

          cmake -G "MinGW Makefiles" `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_INSTALL_PREFIX=install `
                -DCMAKE_CXX_STANDARD=17 `
                -DCMAKE_C_FLAGS="-Wno-error" `
                -DCMAKE_CXX_FLAGS="-Wno-error -O2 -D_hypot=hypot" `
                -DBUILD_SHARED_LIBS=$sharedFlag `
                $worldFlag `
                $contribFlag `
                -DBUILD_EXAMPLES=OFF `
                -DBUILD_TESTS=OFF `
                -DBUILD_PERF_TESTS=OFF `
                -DBUILD_DOCS=OFF `
                -DBUILD_JAVA=OFF `
                -DBUILD_PYTHON=OFF `
                -DCPU_DISPATCH="" `
                -DOPENCV_ENABLE_MEMALIGN=OFF `
                -DWITH_IPP=OFF `
                -DWITH_ITT=OFF `
                -DWITH_MSMF=OFF `
                -DWITH_MFX=OFF `
                -DWITH_OBSENSOR=OFF `
                -DWITH_OPENCL=OFF `
                -DWITH_CUDA=OFF `
                -DWITH_OPENVINO=OFF `
                -DWITH_VULKAN=OFF `
                -DWITH_OPENGL=ON `
                -DWITH_QT=OFF `
                -DWITH_GTK=OFF `
                -DWITH_FFMPEG=ON `
                -DWITH_PROTOBUF=ON `
                -DBUILD_PROTOBUF=ON `
                -DPROTOBUF_UPDATE_FILES=OFF `
                -DOPENCV_DNN_ONNX=ON `
                -DENABLE_CXX11=ON `
                ../opencv

      # ==========================================================
      # 8. 编译
      # ==========================================================
      - name: Build
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          cd build_opencv
          mingw32-make -j4 2>&1 | Tee-Object make.log

          if ($LASTEXITCODE -ne 0) {
            Write-Host ""
            Write-Host "===== BUILD FAILED ====="
            Write-Host "Last 60 lines:"
            Get-Content make.log -Tail 60
            Write-Host ""
            Write-Host "Retrying single-threaded..."
            mingw32-make 2>&1 | Tee-Object make_retry.log
            Write-Host ""
            Write-Host "Single-threaded last 40 lines:"
            Get-Content make_retry.log -Tail 40
            exit 1
          }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build_opencv/make.log
            build_opencv/make_retry.log
            build_opencv/CMakeCache.txt
          retention-days: 7

      # ==========================================================
      # 9. 安装
      # ==========================================================
      - name: Install
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          cd build_opencv
          mingw32-make install

      # ==========================================================
      # 10. 打包
      # ==========================================================
      - name: Pack
        if: steps.check.outputs.skip == 'false'
        id: pack
        shell: pwsh
        run: |
          $display = "${{ steps.get_tag.outputs.display }}"
          $shared = if ("${{ inputs.build_shared }}" -eq "true") { "shared" } else { "static" }
          $world = if ("${{ inputs.build_world }}" -eq "true") { "world" } else { "modules" }
          $contrib = if ("${{ inputs.build_contrib }}" -eq "true") { "contrib" } else { "nocontrib" }
          $zipName = "opencv-${display}-mingw-x64-${shared}-${world}-${contrib}.zip"
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT

          cd build_opencv
          Compress-Archive -Path install -DestinationPath $zipName -CompressionLevel Optimal
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Archive: $zipName ($size MB)"

      # ==========================================================
      # 11. 生成构建信息
      # ==========================================================
      - name: Generate build info
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $display = "${{ steps.get_tag.outputs.display }}"
          $nl = [Environment]::NewLine
          $info = "OpenCV $display MinGW Build" + $nl
          $info += "========================" + $nl + $nl
          $info += "Version:        $display" + $nl
          $info += "Compiler:       MinGW g++ (x86_64-w64-mingw32)" + $nl
          $info += "C++ Standard:   C++17" + $nl
          $info += "Build Type:     Release" + $nl
          $info += "Shared Libs:    ${{ inputs.build_shared }}" + $nl
          $info += "opencv_world:   ${{ inputs.build_world }}" + $nl
          $info += "opencv_contrib: ${{ inputs.build_contrib }}" + $nl + $nl
          $info += "OpenCV 5 Key Changes:" + $nl
          $info += "- New 'geometry' module: minAreaRect, convexHull, getPerspectiveTransform" + $nl
          $info += "- Migrated: calib3d -> geometry, imgproc -> geometry" + $nl
          $info += "- DNN engine refactored (NEW + CLASSIC)" + $nl
          $info += "- C++17 required" + $nl + $nl
          $info += "Directory Layout:" + $nl
          $info += "  install/include/opencv2/   Headers" + $nl
          $info += "  install/lib/               Import libs (.dll.a / .a)" + $nl
          $info += "  install/bin/               DLLs (shared build)" + $nl
          $info += "  install/share/             CMake configs" + $nl + $nl
          $info += "Quick Start (g++, world):" + $nl
          $info += '  g++ -std=c++17 -O2 main.cpp -o myapp -I"install/include/opencv2/.." -L"install/lib" -lopencv_world' + $nl + $nl
          $info += "Quick Start (g++, modules):" + $nl
          $info += '  g++ -std=c++17 -O2 main.cpp -o myapp -I"install/include/opencv2/.." -L"install/lib"' + $nl
          $info += '      -lopencv_core -lopencv_imgproc -lopencv_dnn -lopencv_geometry -lopencv_imgcodecs -lopencv_highgui' + $nl + $nl
          $info += "Quick Start (CMake):" + $nl
          $info += '  cmake -G "MinGW Makefiles" -DOpenCV_DIR="install/cmake" ..' + $nl
          $info += '  mingw32-make' + $nl + $nl
          $info += "MinGW Patches Applied:" + $nl
          $info += "  A. mlasi.h: posix_memalign -> _aligned_malloc (DNN/MLAS)" + $nl
          $info += "  B. zbuild.h: _POSIX_C_SOURCE MinGW guard (zlib-ng)" + $nl
          $info += "  C. zlib-ng CMakeLists.txt: posix_memalign/aligned_alloc MINGW guard" + $nl
          $info += "  D. openjpeg CMakeLists.txt: posix_memalign MINGW guard" + $nl
          $info += "  E. OPENCV_ENABLE_MEMALIGN=OFF (CMake flag)" + $nl

          Set-Content "build_opencv/BUILD_INFO.txt" $info -Encoding UTF8
          $zipName = "${{ steps.pack.outputs.zip_name }}"
          Compress-Archive -Path "build_opencv/BUILD_INFO.txt" -DestinationPath $zipName -Update

      # ==========================================================
      # 12. 发布 Release
      # ==========================================================
      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "opencv-mingw-${{ steps.get_tag.outputs.tag }}"
          name: "OpenCV ${{ steps.get_tag.outputs.display }} MinGW"
          body: |
            ## OpenCV ${{ steps.get_tag.outputs.display }} MinGW Build

            | Item | Value |
            |------|-------|
            | Compiler | MinGW g++ (x86_64-w64-mingw32) |
            | C++ Standard | C++17 |
            | Build Type | Release |
            | Shared Libs | ${{ inputs.build_shared }} |
            | opencv_world | ${{ inputs.build_world }} |
            | opencv_contrib | ${{ inputs.build_contrib }} |

            ### OpenCV 5 Key Changes
            - **New `geometry` module**: `minAreaRect`, `convexHull`, `getPerspectiveTransform`, `findHomography` migrated from `calib3d`/`imgproc`
            - **Must link `-lopencv_geometry`** (OpenCV 5 only)
            - **DNN engine refactored**: NEW engine + CLASSIC engine
            - **C++17 required**

            ### MinGW Patches Applied
            | Patch | File | Fix |
            |-------|------|-----|
            | A | `3rdparty/mlas/lib/mlasi.h` | `posix_memalign` → `_aligned_malloc` |
            | B | `3rdparty/zlib-ng/zbuild.h` | `_POSIX_C_SOURCE` MinGW guard |
            | C | `3rdparty/zlib-ng/CMakeLists.txt` | `check_symbol_exists` MINGW guard |
            | D | `3rdparty/openjpeg/CMakeLists.txt` | `check_symbol_exists` MINGW guard |
            | E | CMake flag | `OPENCV_ENABLE_MEMALIGN=OFF` |

            ### Directory Layout
            ```
            install/
            +-- include/opencv2/   Headers
            +-- lib/               Import libs (.dll.a / .a)
            +-- bin/               DLLs (shared build)
            +-- share/             CMake configs (OpenCVConfig.cmake)
            ```

            ### Compile Commands
            **g++ (world build):**
            ```bash
            g++ -std=c++17 -O2 main.cpp -o myapp \
                -I"install/include/opencv2/.." \
                -L"install/lib" \
                -lopencv_world
            ```

            **g++ (modules build):**
            ```bash
            g++ -std=c++17 -O2 main.cpp -o myapp \
                -I"install/include/opencv2/.." \
                -L"install/lib" \
                -lopencv_core -lopencv_imgproc -lopencv_imgcodecs \
                -lopencv_dnn -lopencv_highgui -lopencv_geometry
            ```

            **CMake:**
            ```bash
            cmake -G "MinGW Makefiles" \
                  -DOpenCV_DIR="install/cmake" ..
            mingw32-make
            ```
          draft: false
          prerelease: false
          files: |
            build_opencv/${{ steps.pack.outputs.zip_name }}
            build_opencv/BUILD_INFO.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================================
      # 13. 构建摘要
      # ==========================================================
      - name: Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  Tag: ${{ steps.get_tag.outputs.tag }}"
          Write-Host "  Skip: ${{ steps.check.outputs.skip }}"
          Write-Host "  Zip: ${{ steps.pack.outputs.zip_name }}"
          Write-Host "========================================="
